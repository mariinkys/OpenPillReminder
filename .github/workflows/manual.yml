name: Android Manual Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Rename and Hash APK
        id: process_apk
        run: |
          NAME="OpenPillReminder-latest.apk"
          mv ${{ steps.sign_app.outputs.signedReleaseFile }} "$NAME"
          
          sha256=$(sha256sum "$NAME" | awk '{ print $1 }')
          echo "SHA-256 Hash of APK: $sha256"
          echo "apk_name=$NAME" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: OpenPillReminder-Production-Build
          path: ${{ steps.process_apk.outputs.apk_name }}
          if-no-files-found: error
          retention-days: 3
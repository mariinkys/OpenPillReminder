name: Android Testing Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Decode Keystore
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 -d > release.jks

      - name: Build and Sign Release APK
        id: gradle_build
        env:
          # These match the variables set up in build.gradle.kts
          KEYSTORE_FILE: ${{ github.workspace }}/release.jks
          KEY_ALIAS: ${{ secrets.ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease
          
          # Move and rename for easier artifact identification
          mv app/build/outputs/apk/release/app-release.apk OpenPillReminder-testing.apk
          
          # Generate hash for verification logs
          sha256=$(sha256sum OpenPillReminder-testing.apk | awk '{ print $1 }')
          echo "SHA-256 Hash: $sha256"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenPillReminder-Testing-Build
          path: OpenPillReminder-testing.apk
          if-no-files-found: error
          retention-days: 3

      - name: Cleanup
        if: always()
        run: rm -f release.jks
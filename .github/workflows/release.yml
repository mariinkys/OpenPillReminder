name: Android Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign and Align APK
        env:
          KEYSTORE_BASE64: ${{ secrets.SIGNING_KEY }}
          KEYSTORE_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Decode keystore
          echo "$KEYSTORE_BASE64" | base64 -d > release.jks
          
          # Find apksigner
          SDK_PATH=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -r | head -n 1)
          
          # Sign the APK
          $SDK_PATH/apksigner sign --ks release.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass pass:"$KEYSTORE_PASSWORD" \
            --key-pass pass:"$KEY_PASSWORD" \
            --out OpenPillReminder-${{ github.event.release.tag_name }}.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk
          
          # Security: Shred the temporary keystore
          rm -f release.jks

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: OpenPillReminder-${{ github.event.release.tag_name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Android Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign and Align APK
        env:
          KEYSTORE_BASE64: ${{ secrets.SIGNING_KEY }}
          KEYSTORE_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Decode keystore
          echo "$KEYSTORE_BASE64" | base64 -d > release.jks
          
          # Find apksigner
          SDK_PATH=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -r | head -n 1)
          
          # Sign the APK
          $SDK_PATH/apksigner sign --ks release.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass pass:"$KEYSTORE_PASSWORD" \
            --key-pass pass:"$KEY_PASSWORD" \
            --out OpenPillReminder-${{ github.event.release.tag_name }}.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk
          
          # Security: Shred the temporary keystore
          rm -f release.jks

      - name: Generate APK Hash
        id: generate_hash
        run: |
          sha256=$(sha256sum OpenPillReminder-${{ github.event.release.tag_name }}.apk | awk '{ print $1 }')
          echo "apk_sha=$sha256" >> $GITHUB_OUTPUT
          echo "SHA-256 Hash of APK: $sha256"

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v3
        with:
          files: OpenPillReminder-${{ github.event.release.tag_name }}.apk
          append_body: true
          body: |
            ---
            ### Security Verification
            **APK SHA-256 Hash:** `${{ steps.generate_hash.outputs.apk_sha }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}